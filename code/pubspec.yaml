name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Game engine
  flame: ^1.22.0

  # State management
  provider: ^6.1.2

  # Network service discovery (mDNS/Bonjour)
  nsd: ^5.0.1

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  go_router_builder: ^4.3.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
