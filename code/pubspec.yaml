name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Core & Localization
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Game engine
  flame: ^1.22.0

  # State management
  provider: ^6.1.2

  # Network service discovery (mDNS/Bonjour)
  nsd: ^5.0.1

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^17.3.0

  # Code Gen Annotations
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  flame_audio: ^2.12.1

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter

  # Code Quality (Linter)
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  go_router_builder: ^4.3.0
  flutter_gen_runner: ^5.14.1

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/audio/
