name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.22.0

  # State management
  provider: ^6.1.2

  # Network service discovery (mDNS/Bonjour)
  nsd: ^2.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^14.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
