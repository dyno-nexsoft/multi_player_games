name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Core & Localization
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Game engine
  flame: ^1.22.0

  # State management
  provider: ^6.1.2

  # Network service discovery (mDNS/Bonjour)
  nsd: ^5.0.1

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1

  # Navigation
  go_router: ^17.3.0

  # Code Gen Annotations
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  flame_audio: ^2.12.1
  audioplayers: ^6.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  messagepack: ^0.2.1

  # Local persistence (lifetime stats / leaderboard)
  shared_preferences: ^2.3.2

  # Device sensors (gyroscope for Console Mode controller)
  sensors_plus: ^4.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  # Testing
  flutter_test:
    sdk: flutter

  # Code Quality (Linter)
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  go_router_builder: ^4.3.0
  flutter_gen_runner: ^5.14.1

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1B063A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
