name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Core & Localization
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Navigation & State Management
  go_router: any
  provider: any

  # UI & Styling
  google_fonts: any
  flutter_svg: any
  qr_flutter: any

  # Game Engine & Media
  flame: any
  flame_audio: any
  audioplayers: any

  # Networking & Data Serialization
  nsd: any
  message_pack_dart: any
  web: any

  # Hardware & Device Sensors
  sensors_plus: any
  mobile_scanner: any
  wakelock_plus: any

  # Local Storage
  shared_preferences: any

  # Code Gen Annotations
  json_annotation: any
  freezed_annotation: any

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter

  # Code Quality
  flutter_lints: any

  # Code Generation
  build_runner: any
  json_serializable: any
  freezed: any
  go_router_builder: any
  flutter_gen_runner: any

  # Tools
  flutter_launcher_icons: any

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1B063A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
