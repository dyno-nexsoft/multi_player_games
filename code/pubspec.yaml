name: party_game_hub
description: Party Game Hub - Local multiplayer mini-games for mobile devices.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Core & Localization
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Navigation & State Management
  go_router: ^17.3.0
  provider: ^6.1.2

  # UI & Styling
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  qr_flutter: ^4.1.0

  # Game Engine & Media
  flame: ^1.22.0
  flame_audio: ^2.12.1
  audioplayers: ^6.0.0

  # Networking & Data Serialization
  nsd: ^5.0.1
  message_pack_dart: ^2.0.1

  # Hardware & Device Sensors
  sensors_plus: ^7.0.0
  mobile_scanner: ^7.2.0
  wakelock_plus: ^1.0.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Code Gen Annotations
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter

  # Code Quality
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  go_router_builder: ^4.3.0
  flutter_gen_runner: ^5.14.1

  # Tools
  flutter_launcher_icons: ^0.14.4

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1B063A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
