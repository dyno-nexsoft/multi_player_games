<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grid -->
  <rect x="8" y="8" width="42" height="42" rx="3" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <line x1="8" y1="22" x2="50" y2="22" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="8" y1="36" x2="50" y2="36" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="22" y1="8" x2="22" y2="50" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="36" y1="8" x2="36" y2="50" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
  <!-- Ship (horizontal, 3 cells) -->
  <rect x="10" y="24" width="38" height="10" rx="3" fill="#6C63FF" opacity="0.9"/>
  <!-- Hit marker -->
  <circle cx="29" cy="29" r="4" fill="#FF6584" opacity="0.9"/>
  <!-- Miss marker -->
  <text x="13" y="19" font-size="8" fill="#00D9FF" font-family="sans-serif">•</text>
  <!-- Crosshair on right half -->
  <circle cx="74" cy="35" r="16" fill="none" stroke="#FF6584" stroke-width="2"/>
  <line x1="74" y1="19" x2="74" y2="51" stroke="#FF6584" stroke-width="1.5"/>
  <line x1="58" y1="35" x2="90" y2="35" stroke="#FF6584" stroke-width="1.5"/>
  <circle cx="74" cy="35" r="3" fill="#FF6584"/>
  <!-- Explosion -->
  <text x="55" y="72" font-size="28" font-family="sans-serif">💥</text>
</svg>
