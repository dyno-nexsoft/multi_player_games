<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Goalpost -->
  <rect x="8" y="10" width="48" height="30" rx="2" stroke="#555" stroke-width="2.5" fill="none"/>
  <!-- Net lines horizontal -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#888" stroke-width="1"/>
  <line x1="8" y1="30" x2="56" y2="30" stroke="#888" stroke-width="1"/>
  <!-- Net lines vertical -->
  <line x1="20" y1="10" x2="20" y2="40" stroke="#888" stroke-width="1"/>
  <line x1="32" y1="10" x2="32" y2="40" stroke="#888" stroke-width="1"/>
  <line x1="44" y1="10" x2="44" y2="40" stroke="#888" stroke-width="1"/>

  <!-- Soccer ball -->
  <circle cx="32" cy="50" r="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Pentagon pattern on ball -->
  <path d="M32 42 L36 45 L35 50 L29 50 L28 45 Z" fill="#333"/>
  <path d="M36 45 L41 44 L43 49 L39 53 L35 50 Z" fill="#333" opacity="0.5"/>
  <path d="M28 45 L23 44 L21 49 L25 53 L29 50 Z" fill="#333" opacity="0.5"/>

  <!-- Motion arrow -->
  <path d="M32 42 L32 36" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M29 38 L32 35 L35 38" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
