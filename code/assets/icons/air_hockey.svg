<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Table surface -->
  <rect x="4" y="8" width="56" height="48" rx="4" fill="#1a6b3c" stroke="#555" stroke-width="1.5"/>
  <!-- Center line -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="8" stroke="white" stroke-width="1.5" opacity="0.5" fill="none"/>
  <!-- Goals -->
  <rect x="4" y="22" width="5" height="20" rx="2" fill="#555"/>
  <rect x="55" y="22" width="5" height="20" rx="2" fill="#555"/>

  <!-- Left paddle -->
  <circle cx="16" cy="40" r="8" fill="#6C63FF" stroke="white" stroke-width="1.5"/>
  <circle cx="16" cy="40" r="3" fill="white" opacity="0.5"/>

  <!-- Right paddle -->
  <circle cx="48" cy="24" r="8" fill="#FF6B35" stroke="white" stroke-width="1.5"/>
  <circle cx="48" cy="24" r="3" fill="white" opacity="0.5"/>

  <!-- Puck -->
  <circle cx="32" cy="32" r="5" fill="#222" stroke="#aaa" stroke-width="1"/>
</svg>
