<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Arena ring -->
  <circle cx="32" cy="32" r="28" stroke="#888" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Left sumo bumper -->
  <circle cx="18" cy="32" r="11" fill="#6C63FF" opacity="0.9"/>
  <circle cx="18" cy="25" r="4" fill="#6C63FF"/>

  <!-- Right sumo bumper -->
