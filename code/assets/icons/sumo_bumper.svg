  <!-- Impact stars -->
  <line x1="32" y1="28" x2="32" y2="22" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="30" x2="23" y2="26" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="30" x2="41" y2="26" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
