<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bomb body -->
  <circle cx="50" cy="58" r="28" fill="#222" stroke="#555" stroke-width="2"/>
  <!-- Fuse -->
  <path d="M50 30 Q60 18 55 8" stroke="#FFB300" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Spark at fuse tip -->
  <circle cx="55" cy="8" r="4" fill="#FF6B35"/>
  <circle cx="55" cy="8" r="7" fill="#FFD700" opacity="0.5"/>
  <!-- Timer display on bomb -->
  <rect x="34" y="48" width="32" height="16" rx="3" fill="#1A1A1A" stroke="#FF6584" stroke-width="1"/>
  <text x="50" y="60" font-size="11" fill="#FF6584" text-anchor="middle" font-family="monospace" font-weight="bold">0:08</text>
  <!-- Neon glow ring -->
  <circle cx="50" cy="58" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
  <!-- Swipe arrows -->
  <text x="12" y="70" font-size="16" fill="#6C63FF" opacity="0.7">←</text>
  <text x="74" y="70" font-size="16" fill="#6C63FF" opacity="0.7">→</text>
</svg>
