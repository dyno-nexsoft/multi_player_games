<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Table -->
  <rect x="4" y="10" width="56" height="44" rx="4" fill="#1a6b3c" stroke="#5D4037" stroke-width="3"/>
  <!-- Pockets -->
  <circle cx="6" cy="12" r="4" fill="#111"/>
  <circle cx="58" cy="12" r="4" fill="#111"/>
  <circle cx="6" cy="52" r="4" fill="#111"/>
  <circle cx="58" cy="52" r="4" fill="#111"/>
  <circle cx="32" cy="11" r="3" fill="#111"/>
  <circle cx="32" cy="53" r="3" fill="#111"/>
  <!-- Cue ball -->
  <circle cx="20" cy="32" r="7" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <!-- 8-ball -->
  <circle cx="40" cy="32" r="7" fill="#222" stroke="#111" stroke-width="0.5"/>
  <circle cx="40" cy="32" r="3" fill="white"/>
  <text x="40" y="35.5" font-size="5" fill="#222" text-anchor="middle" font-weight="bold">8</text>
  <!-- Colored balls -->
  <circle cx="50" cy="24" r="5" fill="#E53935"/>
  <circle cx="14" cy="40" r="5" fill="#2196F3"/>
  <!-- Cue stick -->
  <line x1="4" y1="52" x2="20" y2="32" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
</svg>
