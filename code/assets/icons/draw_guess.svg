<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pencil / canvas icon for Draw & Guess -->
  <rect x="10" y="10" width="60" height="50" rx="4" fill="#fff" stroke="#333" stroke-width="4"/>
  <!-- Squiggly drawing lines on canvas -->
  <path d="M18 28 Q28 20 38 28 Q48 36 58 28" stroke="#6C63FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M18 38 Q28 44 38 38" stroke="#FF6584" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Pencil -->
  <rect x="58" y="38" width="10" height="32" rx="2" transform="rotate(-45 63 54)" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <polygon points="68,72 72,82 62,76" fill="#333"/>
  <!-- Speech bubble for guess -->
  <rect x="55" y="10" width="34" height="22" rx="5" fill="#6C63FF"/>
  <polygon points="60,32 65,32 62,38" fill="#6C63FF"/>
  <text x="72" y="25" font-size="11" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">?</text>
</svg>
