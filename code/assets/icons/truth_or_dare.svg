<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark circle bg -->
  <circle cx="32" cy="32" r="28" fill="#1A1A2E"/>
  <circle cx="32" cy="32" r="28" stroke="#6C63FF" stroke-width="2" opacity="0.5"/>

  <!-- Truth card (left, tilted) -->
  <rect x="10" y="18" width="22" height="30" rx="4" fill="#6C63FF" opacity="0.9" transform="rotate(-8 21 33)"/>
  <text x="18" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold" transform="rotate(-8 18 34)">?</text>

  <!-- Dare card (right, tilted) -->
  <rect x="32" y="18" width="22" height="30" rx="4" fill="#FF6584" opacity="0.9" transform="rotate(8 43 33)"/>
  <text x="46" y="36" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold" transform="rotate(8 46 34)">★</text>

  <!-- Glow dots -->
  <circle cx="32" cy="56" r="2" fill="#FFD700"/>
  <circle cx="26" cy="56" r="1.5" fill="#6C63FF" opacity="0.6"/>
  <circle cx="38" cy="56" r="1.5" fill="#FF6584" opacity="0.6"/>
</svg>
