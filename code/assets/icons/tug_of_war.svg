<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Left player head -->
  <circle cx="10" cy="14" r="5" fill="#6C63FF"/>
  <!-- Left player body pulling rope -->
  <line x1="10" y1="19" x2="10" y2="36" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="18" y2="30" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
  <!-- Left legs -->
  <line x1="10" y1="36" x2="5" y2="46" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="36" x2="15" y2="46" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>

  <!-- Rope -->
  <path d="M18 30 Q26 26 32 30 Q38 34 46 30" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Right player head -->
  <circle cx="54" cy="14" r="5" fill="#FF6B35"/>
  <!-- Right player body pulling rope -->
  <line x1="54" y1="19" x2="54" y2="36" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="24" x2="46" y2="30" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="54" y1="36" x2="49" y2="46" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="36" x2="59" y2="46" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>

  <!-- Knot in middle -->
  <circle cx="32" cy="30" r="3" fill="#FF6B35"/>
</svg>
